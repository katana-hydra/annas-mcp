name: Daily Healthcheck

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger
    inputs:
      reason:
        description: 'Reason for manual healthcheck'
        required: false
        default: 'Manual trigger'
        type: string
  push:
    branches:
      - main
    paths:
      - 'scripts/healthcheck.sh'
      - '.github/workflows/healthcheck.yml'

jobs:
  healthcheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Download dependencies
        run: go mod download

      - name: Log trigger information
        run: |
          if [ -n "${{ github.event.inputs.reason }}" ]; then
            echo "🔧 Manual trigger reason: ${{ github.event.inputs.reason }}"
          else
            echo "⏰ Scheduled healthcheck run"
          fi

      - name: Run healthcheck
        run: |
          chmod +x scripts/healthcheck.sh
          ./scripts/healthcheck.sh
        env:
          # Healthcheck doesn't download files, so no API key needed
          ANNAS_SECRET_KEY: "healthcheck-mode"
          ANNAS_DOWNLOAD_PATH: "/tmp"

      - name: Report success
        if: success()
        run: |
          echo "✅ All healthchecks passed successfully!"
          echo "Book search and article search are working correctly."

      - name: Report failure
        if: failure()
        run: |
          echo "❌ Healthcheck failed!"
          echo "Please investigate the Anna's Archive MCP service."
          exit 1
